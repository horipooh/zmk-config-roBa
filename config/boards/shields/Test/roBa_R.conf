CONFIG_ZMK_KEYBOARD_NAME="roBa"
CONFIG_ZMK_MOUSE=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BLE=y
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_PMW3610=y
CONFIG_PMW3610_CPI=700
CONFIG_PMW3610_CPI_DIVIDOR=1
CONFIG_PMW3610_ORIENTATION_180=y
# CONFIG_PMW3610_SNIPE_CPI=700
# CONFIG_PMW3610_SNIPE_CPI_DIVIDOR=4
CONFIG_PMW3610_SCROLL_TICK=16
CONFIG_PMW3610_INVERT_X=n
CONFIG_PMW3610_INVERT_SCROLL_X=y
CONFIG_PMW3610_RUN_DOWNSHIFT_TIME_MS=3264
CONFIG_PMW3610_REST1_SAMPLE_TIME_MS=20
#CONFIG_PMW3610_REST1_DOWNSHIFT_TIME_MS=9600
#CONFIG_PMW3610_REST2_SAMPLE_TIME_MS=
#CONFIG_PMW3610_REST2_DOWNSHIFT_TIME_MS=
#CONFIG_PMW3610_REST3_SAMPLE_TIME_MS=
#CONFIG_PMW3610_REST3_DOWNSHIFT_TIME_MS=
#CONFIG_PMW3610_FORCE_AWAKE=n
CONFIG_PMW3610_POLLING_RATE_125_SW=y
CONFIG_PMW3610_AUTOMOUSE_TIMEOUT_MS=700    # トラボ操作後にオートマウスレイヤーを解除するまでの時間(ms)
CONFIG_PMW3610_AUTOMOUSE_LAYER=4           # オートマウスで切り替えるレイヤー番号
CONFIG_PMW3610_SMART_ALGORITHM=y
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# 無線安定化 -------------------
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y            # 送信出力を最大化
CONFIG_BT_BUF_ACL_TX_COUNT=10             # ACL送信バッファ増量
CONFIG_BT_BUF_ACL_RX_COUNT=10             # ACL受信バッファ増量
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6        # 接続インターバル最小値(7.5ms)
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12       # 接続インターバル最大値(15ms)
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400      # 接続タイムアウト延長

# 打鍵レイテンシ改善 -------------------
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1      # 押下デバウンス(デフォルト5ms→1ms)
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5    # リリースデバウンス

# スリープ設定 -------------------
CONFIG_ZMK_IDLE_TIMEOUT=60000             # 1分でアイドル
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000      # 15分でディープスリープ
